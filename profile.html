<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>beVivid Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: #050505; color: #f5f0eb; font-family: 'Syne', sans-serif; }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; opacity: .05; background-image: radial-gradient(circle at 20% 20%, rgba(255,45,85,.18), transparent 24%), radial-gradient(circle at 80% 10%, rgba(52,170,220,.18), transparent 26%), radial-gradient(circle at 50% 100%, rgba(0,229,176,.14), transparent 25%); }
.shell { position: relative; z-index: 1; min-height: 100vh; padding: 28px; max-width: 1560px; margin: 0 auto; }
.topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.back, .studio { display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; border: 1px solid rgba(245,240,235,.12); background: rgba(245,240,235,.03); color: #f5f0eb; text-decoration: none; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; }
.header { margin: 0 auto 20px; max-width: 1280px; width: 100%; }
.eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: #34aadc; margin-bottom: 12px; }
.title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(58px, 10vw, 120px); line-height: .88; margin: 0; }
.sub { color: rgba(245,240,235,.46); max-width: 680px; line-height: 1.8; margin-top: 10px; }
.profile-search-corner { position: fixed; top: 28px; right: 28px; z-index: 50; }
.profile-tools { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-top: 22px; }
.search-form { display: flex; gap: 10px; flex-wrap: wrap; }
.search-input { min-width: 260px; border: 1px solid rgba(245,240,235,.12); background: rgba(245,240,235,.03); color: #f5f0eb; border-radius: 999px; padding: 12px 16px; font: inherit; outline: none; }
.search-btn, .recognize-btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 18px; border-radius: 999px; border: 1px solid rgba(245,240,235,.12); background: rgba(245,240,235,.03); color: #f5f0eb; text-decoration: none; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; cursor: pointer; }
.recognize-btn { background: #f5f0eb; color: #050505; border-color: transparent; }
.recognize-btn[disabled] { opacity: .6; cursor: not-allowed; }
.recognition-card { border: 1px solid rgba(245,240,235,.08); border-radius: 18px; padding: 14px 16px; background: rgba(245,240,235,.03); min-width: 210px; }
.recognition-card small { display: block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: rgba(245,240,235,.34); margin-bottom: 8px; }
.recognition-card strong { font-size: 28px; line-height: 1; display: block; }
.recognition-card span { display: block; margin-top: 8px; color: rgba(245,240,235,.56); font-size: 13px; line-height: 1.5; }
.profile-note { color: rgba(245,240,235,.5); font-size: 13px; line-height: 1.6; }
.stage-wrap { overflow: auto; border: 1px solid rgba(245,240,235,.08); border-radius: 28px; padding: 20px; background: rgba(245,240,235,.02); display: flex; justify-content: center; }
.stage { position: relative; width: 1200px; min-height: 900px; border-radius: 24px; overflow: hidden; border: 1px solid rgba(245,240,235,.08); background: #111; box-shadow: 0 30px 90px rgba(0,0,0,.35); }
.stage::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; }
.el { position: absolute; overflow: hidden; }
.text-block { padding: 18px; white-space: pre-wrap; line-height: 1.45; }
.image-block img, .embed-block iframe { width: 100%; height: 100%; border: 0; display: block; object-fit: cover; position: relative; z-index: 1; }
.spotify-card { width: 100%; height: 100%; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(135deg,#1db954,#111111 72%); color: #ffffff; }
.spotify-card small { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; opacity: .7; }
.spotify-card strong { font-size: 22px; line-height: 1.1; }
.spotify-card span { font-size: 13px; line-height: 1.6; opacity: .85; }
.spotify-card a { display: inline-flex; width: fit-content; margin-top: 12px; padding: 10px 14px; border-radius: 999px; background: rgba(255,255,255,.16); color: #fff; text-decoration: none; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; }
.visualizer-bg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: .9; }
.audio-toggle { position: absolute; left: 20px; bottom: 20px; z-index: 4; border: 1px solid rgba(245,240,235,.12); background: rgba(5,5,5,.55); color: #f5f0eb; border-radius: 999px; padding: 12px 16px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase; backdrop-filter: blur(14px); }
.audio-note { position: absolute; right: 20px; bottom: 22px; z-index: 4; color: rgba(245,240,235,.42); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; }
.empty { padding: 26px; border-radius: 16px; border: 1px solid rgba(245,240,235,.08); background: rgba(245,240,235,.03); color: rgba(245,240,235,.56); line-height: 1.8; }
@media (max-width: 760px) { .shell { padding: 18px; } .profile-search-corner { position: static; margin-bottom: 16px; } .profile-tools { flex-direction: column; align-items: stretch; } .search-form { width: 100%; } .search-input { min-width: 0; width: 100%; } .stage-wrap { padding: 10px; } .stage { width: 980px; min-height: 780px; } .audio-toggle { left: 12px; bottom: 12px; } .audio-note { left: 12px; right: auto; bottom: 58px; } }
</style>
</head>
<body>
<div class="shell">
  <div class="profile-search-corner">
    <form class="search-form" onsubmit="event.preventDefault(); searchProfiles();">
      <input class="search-input" id="searchHandle" type="text" placeholder="Find a user by handle" />
      <button class="search-btn" type="submit">Search User</button>
    </form>
  </div>
  <div class="topbar">
    <a class="back" href="/">Back To beVivid</a>
    <a class="studio" id="studioLink" href="/profiledata">Open Studio</a>
  </div>
  <div class="header">
    <div class="eyebrow">Profile</div>
    <h1 class="title" id="profileTitle">Loading...</h1>
    <div class="sub" id="profileSub">Pulling the latest profile layout from Firebase.</div>
    <div class="profile-tools">
      <div class="recognition-card">
        <small>Recognition Points</small>
        <strong id="recognitionPoints">0</strong>
        <span id="recognitionMeta">Lifetime appreciation from the community.</span>
      </div>
      <button class="recognize-btn" id="recognizeBtn" onclick="grantRecognition()">Grant Recognition</button>
    </div>
    <div class="profile-note" id="recognitionStatus"></div>
  </div>
  <div class="stage-wrap"><div class="stage" id="stage"></div></div>
</div>

<script>
const FIREBASE_DB_URL = 'https://bevivid-73a69-default-rtdb.firebaseio.com';
const AUTH_COOKIE_NAME = 'bevivid_session';
const params = new URLSearchParams(window.location.search);
const requestedHandle = params.get('handle');
let activeUser = null;
let viewingHandle = null;
const audioState = { el: null, ctx: null, analyser: null, data: null, raf: null, playing: false };

function getCookie(name) { const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)')); return match ? decodeURIComponent(match[1]) : ''; }
function decodeLayout(value) { return JSON.parse(decodeURIComponent(escape(atob(value)))); }
function escapeHtml(value) { return String(value || '').replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch])); }
function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }
function getSessionUser() { const raw = getCookie(AUTH_COOKIE_NAME); if (!raw) return null; try { return JSON.parse(raw); } catch (_) { return null; } }
function todayKey() { return new Date().toISOString().slice(0, 10); }
function setRecognitionStatus(message) { document.getElementById('recognitionStatus').textContent = message || ''; }
function withAlpha(color, alpha) {
  const hex = /^#[0-9a-fA-F]{6}$/.test(String(color || '').trim()) ? color : '#161616';
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}
function updateRecognitionUi(user) {
  document.getElementById('recognitionPoints').textContent = String(user.recognitionPoints || 0);
  const btn = document.getElementById('recognizeBtn');
  const viewer = activeUser;
  const log = (user.recognitionLog && user.recognitionLog[todayKey()]) || {};
  if (!viewer || !viewer.handle) {
    btn.disabled = true;
    btn.textContent = 'Log In To Recognize';
    setRecognitionStatus('Sign in first to give one recognition point per day.');
    return;
  }
  if (viewer.handle === (user.handle || viewingHandle)) {
    btn.disabled = true;
    btn.textContent = 'Your Profile';
    setRecognitionStatus('You cannot give recognition to yourself.');
    return;
  }
  if (log[viewer.handle]) {
    btn.disabled = true;
    btn.textContent = 'Already Given Today';
    setRecognitionStatus('You already gave this profile a recognition point today.');
    return;
  }
  btn.disabled = false;
  btn.textContent = 'Grant Recognition';
  setRecognitionStatus('You can grant this profile one lifetime recognition point today.');
}
function getEmbedUrl(type, url) {
  const raw = String(url || '').trim();
  if (!raw) return '';
  if (type === 'spotify' || type === 'song') return raw;
  if (type === 'soundcloud' && raw.includes('soundcloud.com') && !raw.includes('w.soundcloud.com')) return `https://w.soundcloud.com/player/?url=${encodeURIComponent(raw)}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&visual=true`;
  return raw;
}
function getEmbedMarkup(url, type) {
  const src = getEmbedUrl(type, url);
  if (!src) return '';
  if (type === 'spotify' || type === 'song') {
    return `<div class="spotify-card"><small>Spotify</small><strong>Open on Spotify</strong><span>Spotify embeds can return 429s, so this profile uses a direct play link instead.</span><a href="${escapeAttr(src)}" target="_blank" rel="noreferrer">Play</a></div>`;
  }
  return `<iframe src="${escapeAttr(src)}" loading="lazy" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
}

function drawVisualizer(canvas) {
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const width = canvas.clientWidth;
  const height = canvas.clientHeight;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const bars = 54;
  const gap = width / bars;

  function frame() {
    ctx.clearRect(0, 0, width, height);
    const gradient = ctx.createLinearGradient(0, height, width, 0);
    gradient.addColorStop(0, '#ff2d5500');
    gradient.addColorStop(0.4, '#ff2d5555');
    gradient.addColorStop(1, '#34aadc20');
    ctx.fillStyle = gradient;

    let values = new Array(bars).fill(0).map((_, i) => 0.25 + Math.sin((Date.now() / 420) + i * 0.35) * 0.12);
    if (audioState.analyser && audioState.data) {
      audioState.analyser.getByteFrequencyData(audioState.data);
      values = values.map((_, i) => (audioState.data[Math.min(audioState.data.length - 1, i * 2)] || 0) / 255);
    }

    values.forEach((value, i) => {
      const barHeight = Math.max(20, value * (height * 0.65));
      const x = i * gap;
      const y = height - barHeight;
      ctx.fillRect(x + 3, y, Math.max(6, gap - 6), barHeight);
    });

    audioState.raf = requestAnimationFrame(frame);
  }

  if (audioState.raf) cancelAnimationFrame(audioState.raf);
  frame();
}

function setupAudioPlayback(src) {
  if (!src) return;
  if (!audioState.el) {
    audioState.el = new Audio();
    audioState.el.loop = true;
    audioState.el.crossOrigin = 'anonymous';
  }
  audioState.el.src = src;
  audioState.el.load();
}

async function toggleProfileAudio() {
  if (!audioState.el) return;
  if (!audioState.ctx) {
    audioState.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioState.ctx.createMediaElementSource(audioState.el);
    audioState.analyser = audioState.ctx.createAnalyser();
    audioState.analyser.fftSize = 128;
    audioState.data = new Uint8Array(audioState.analyser.frequencyBinCount);
    source.connect(audioState.analyser);
    audioState.analyser.connect(audioState.ctx.destination);
  }
  if (audioState.ctx.state === 'suspended') await audioState.ctx.resume();
  if (audioState.playing) {
    audioState.el.pause();
    audioState.playing = false;
  } else {
    await audioState.el.play();
    audioState.playing = true;
  }
  const btn = document.getElementById('audioToggle');
  if (btn) btn.textContent = audioState.playing ? 'Pause Audio' : 'Play Audio';
}

function searchProfiles() {
  const handle = document.getElementById('searchHandle').value.trim().replace(/[^a-z0-9_]/gi, '').toLowerCase();
  if (!handle) return;
  window.location.href = `/profile?handle=${encodeURIComponent(handle)}`;
}

async function grantRecognition() {
  if (!activeUser || !activeUser.handle || !viewingHandle) return;
  const btn = document.getElementById('recognizeBtn');
  btn.disabled = true;
  btn.textContent = 'Granting...';
  try {
    const response = await fetch(`${FIREBASE_DB_URL}/users/${encodeURIComponent(viewingHandle)}.json`);
    const user = await response.json();
    if (!user) throw new Error('Profile not found.');
    if ((user.handle || viewingHandle) === activeUser.handle) throw new Error('You cannot recognize yourself.');
    const day = todayKey();
    const dayLog = Object.assign({}, (user.recognitionLog && user.recognitionLog[day]) || {});
    if (dayLog[activeUser.handle]) throw new Error('You already gave this user recognition today.');
    dayLog[activeUser.handle] = true;
    const patch = {
      recognitionPoints: Number(user.recognitionPoints || 0) + 1,
      recognitionLog: Object.assign({}, user.recognitionLog || {}, { [day]: dayLog })
    };
    const save = await fetch(`${FIREBASE_DB_URL}/users/${encodeURIComponent(viewingHandle)}.json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch)
    });
    if (!save.ok) throw new Error('Firebase blocked the recognition update.');
    user.recognitionPoints = patch.recognitionPoints;
    user.recognitionLog = patch.recognitionLog;
    updateRecognitionUi(user);
    setRecognitionStatus('Recognition granted. That point stays on their profile for life.');
  } catch (error) {
    setRecognitionStatus(error.message || 'Could not grant recognition.');
    btn.disabled = false;
    btn.textContent = 'Grant Recognition';
  }
}

async function loadProfile() {
  activeUser = getSessionUser();
  let handle = requestedHandle;
  if (!handle) {
    if (activeUser) handle = activeUser.handle;
  }
  if (!handle) {
    document.getElementById('profileTitle').textContent = 'No handle selected';
    document.getElementById('profileSub').textContent = 'Open this page with ?handle=yourhandle or sign in first.';
    document.getElementById('stage').innerHTML = '<div class="empty">No profile handle was provided.</div>';
    return;
  }

  viewingHandle = handle;
  document.getElementById('searchHandle').value = handle;
  document.getElementById('studioLink').href = `/profiledata?handle=${encodeURIComponent(handle)}`;
  const response = await fetch(`${FIREBASE_DB_URL}/users/${encodeURIComponent(handle)}.json`);
  const user = await response.json();
  if (!user) {
    document.getElementById('profileTitle').textContent = 'Profile not found';
    document.getElementById('profileSub').textContent = 'That handle does not exist in Firebase yet.';
    document.getElementById('stage').innerHTML = '<div class="empty">This profile has not been created yet.</div>';
    document.getElementById('recognitionPoints').textContent = '0';
    document.getElementById('recognizeBtn').disabled = true;
    document.getElementById('recognizeBtn').textContent = 'Unavailable';
    setRecognitionStatus('Search for another handle or create this profile first.');
    return;
  }

  document.getElementById('profileTitle').textContent = user.displayName || '@' + handle;
  document.getElementById('profileSub').textContent = '@' + (user.handle || handle) + '  |  ' + (user.bio || 'This vivid profile is still being shaped.');
  updateRecognitionUi(user);

  const stage = document.getElementById('stage');
  if (!user.profileLayoutEncoded) {
    stage.innerHTML = '<div class="empty">This user has not published any profile layout yet.</div>';
    return;
  }

  const layout = decodeLayout(user.profileLayoutEncoded);
  stage.style.background = `radial-gradient(circle at 20% 10%, ${(layout.accent || '#ff2d55')}22, transparent 26%), ${layout.background || '#111111'}`;
  stage.innerHTML = '';

  const viz = document.createElement('canvas');
  viz.className = 'visualizer-bg';
  stage.appendChild(viz);
  drawVisualizer(viz);

  if (layout.songAudio) {
    setupAudioPlayback(layout.songAudio);
    const button = document.createElement('button');
    button.className = 'audio-toggle';
    button.id = 'audioToggle';
    button.textContent = audioState.playing ? 'Pause Audio' : 'Play Audio';
    button.onclick = toggleProfileAudio;
    stage.appendChild(button);

    const note = document.createElement('div');
    note.className = 'audio-note';
    note.textContent = layout.songLabel || 'Profile song ready';
    stage.appendChild(note);
  }

  (layout.elements || []).slice().sort((a, b) => (a.z || 0) - (b.z || 0)).forEach(el => {
    const node = document.createElement('div');
    node.className = 'el';
    node.style.left = `${el.x}px`;
    node.style.top = `${el.y}px`;
    node.style.width = `${el.w}px`;
    node.style.height = `${el.h}px`;
    node.style.borderRadius = `${el.radius || 0}px`;
    node.style.opacity = String(el.opacity ?? 1);
    node.style.transform = `rotate(${el.rotation || 0}deg)`;
    node.style.background = el.type === 'image' ? withAlpha(el.bg || '#161616', el.bgAlpha ?? 0.28) : (el.bg || 'rgba(255,255,255,0.03)');
    node.style.zIndex = String(el.z || 1);

    if (el.type === 'text' || el.type === 'shape') {
      node.className += ' text-block';
      node.style.color = el.color || '#f5f0eb';
      node.style.fontFamily = el.fontFamily || 'Syne';
      node.style.fontSize = `${el.fontSize || 20}px`;
      node.style.textAlign = el.align || 'left';
      node.textContent = el.text || '';
    } else if (el.type === 'image') {
      node.className += ' image-block';
      node.innerHTML = el.url ? `<img src="${escapeAttr(el.url)}" alt="">` : '';
    } else {
      node.className += ' embed-block';
      node.innerHTML = getEmbedMarkup(el.url, el.type);
    }

    stage.appendChild(node);
  });
}

loadProfile();
</script>
</body>
</html>
