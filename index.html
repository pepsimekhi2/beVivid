<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>beVivid — We're Not Open Yet</title>
<meta name="application-name" content="beVivid">
<meta name="description" content="beVivid is preparing to launch.">
<meta property="og:site_name" content="beVivid">
<meta property="og:title" content="beVivid">
<meta name="twitter:title" content="beVivid">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.svg">
<script type="application/ld+json"
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #050505;
    --white: #f5f0eb;
    --vivid-1: #ff2d55;
    --vivid-2: #ff9500;
    --vivid-3: #34aadc;
    --vivid-4: #a259ff;
    --vivid-5: #00e5b0;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    
  }



  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    opacity: 0.045;
    pointer-events: none;
    z-index: 100;
    animation: grainShift 0.4s steps(1) infinite;
  }
  @keyframes grainShift {
    0%   { transform: translate(0,0); }
    25%  { transform: translate(-2px,1px); }
    50%  { transform: translate(1px,-1px); }
    75%  { transform: translate(-1px,2px); }
    100% { transform: translate(2px,-2px); }
  }

  /* ORBS */
  .orb-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0;
    animation: orbFloat linear infinite;
  }
  .orb:nth-child(1) {
    width: 600px; height: 600px;
    background: radial-gradient(circle, var(--vivid-1), transparent 70%);
    top: -20%; left: -10%;
    animation-duration: 22s;
    animation-delay: 0s;
  }
  .orb:nth-child(2) {
    width: 500px; height: 500px;
    background: radial-gradient(circle, var(--vivid-4), transparent 70%);
    top: 60%; right: -10%;
    animation-duration: 28s;
    animation-delay: -8s;
  }
  .orb:nth-child(3) {
    width: 400px; height: 400px;
    background: radial-gradient(circle, var(--vivid-3), transparent 70%);
    top: 30%; left: 40%;
    animation-duration: 19s;
    animation-delay: -14s;
  }
  .orb:nth-child(4) {
    width: 350px; height: 350px;
    background: radial-gradient(circle, var(--vivid-5), transparent 70%);
    bottom: -5%; left: 20%;
    animation-duration: 25s;
    animation-delay: -5s;
  }
  @keyframes orbFloat {
    0%   { opacity: 0; transform: scale(0.8) translateY(0px); }
    10%  { opacity: 0.18; }
    50%  { opacity: 0.22; transform: scale(1.05) translateY(-30px); }
    90%  { opacity: 0.18; }
    100% { opacity: 0; transform: scale(0.8) translateY(0px); }
  }

  /* LAYOUT */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(24px, 5vw, 60px);
  }

  /* HEADER */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    animation: fadeUp 1s ease both;
    animation-delay: 0.1s;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: 0.04em;
    line-height: 1;
    background: linear-gradient(135deg, var(--white) 40%, rgba(245,240,235,0.4));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,235,0.45);
    border: 1px solid rgba(245,240,235,0.12);
    padding: 8px 14px;
    border-radius: 100px;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--vivid-1);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  /* MAIN */
  main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(40px, 8vh, 100px) 0;
    max-width: 1200px;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: clamp(10px, 1.2vw, 13px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--vivid-2);
    margin-bottom: 24px;
    animation: fadeUp 1s ease both;
    animation-delay: 0.3s;
  }

  .headline-wrap {
    overflow: hidden;
    margin-bottom: 8px;
  }
  .headline {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 14vw, 200px);
    line-height: 0.9;
    letter-spacing: -0.01em;
    display: block;
    animation: slideUp 1s cubic-bezier(.16,1,.3,1) both;
  }
  .headline-wrap:nth-child(3) .headline { animation-delay: 0.4s; }
  .headline-wrap:nth-child(4) .headline { animation-delay: 0.52s; }

  .headline .vivid-word {
    position: relative;
    display: inline-block;
  }
  .headline .vivid-word::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--vivid-1), var(--vivid-2), var(--vivid-4), var(--vivid-3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
    clip-path: inset(0 100% 0 0);
    animation: shimmer 4s linear infinite, revealGrad 1.4s 1s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  @keyframes revealGrad {
    0%   { clip-path: inset(0 100% 0 0); }
    100% { clip-path: inset(0 0% 0 0); }
  }

  .sub-block {
    margin-top: clamp(28px, 4vh, 52px);
    max-width: 520px;
    animation: fadeUp 1s ease both;
    animation-delay: 0.7s;
  }
  .sub-text {
    font-size: clamp(15px, 1.6vw, 18px);
    font-weight: 400;
    line-height: 1.65;
    color: rgba(245,240,235,0.55);
  }
  .sub-text em {
    color: var(--white);
    font-style: normal;
    font-weight: 700;
  }

  /* NOTIFY FORM */
  .form-wrap {
    margin-top: clamp(32px, 5vh, 56px);
    animation: fadeUp 1s ease both;
    animation-delay: 0.9s;
  }
  .form-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(245,240,235,0.35);
    margin-bottom: 12px;
  }
  .notify-toggle {
    display: flex;
    gap: 0;
    max-width: 460px;
    margin-bottom: 10px;
  }
  .toggle-btn {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(245,240,235,0.14);
    padding: 8px 0;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(245,240,235,0.3);
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn:first-child { border-radius: 4px 0 0 4px; }
  .toggle-btn:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
  .toggle-btn.active {
    background: rgba(245,240,235,0.08);
    color: var(--white);
    border-color: rgba(245,240,235,0.35);
  }
  .form-row {
    display: flex;
    max-width: 460px;
    border: 1px solid rgba(245,240,235,0.14);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .form-row:focus-within { border-color: rgba(245,240,235,0.45); }
  .sms-prefix {
    display: none;
    align-items: center;
    padding: 0 12px 0 16px;
    background: rgba(245,240,235,0.04);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: rgba(245,240,235,0.4);
    border-right: 1px solid rgba(245,240,235,0.1);
    white-space: nowrap;
  }
  .form-row input {
    flex: 1;
    background: rgba(245,240,235,0.04);
    border: none;
    outline: none;
    padding: 14px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: var(--white);
  }
  .form-row input::placeholder { color: rgba(245,240,235,0.25); }
  .form-row button {
    background: var(--white);
    border: none;
    padding: 14px 22px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--black);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .form-row button:hover { background: var(--vivid-2); }
  .form-note {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: rgba(245,240,235,0.2);
  }
  .success-msg {
    display: none;
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--vivid-5);
  }

  /* FOOTER */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
    animation: fadeUp 1s ease both;
    animation-delay: 1.1s;
  }
  .footer-def {
    font-family: 'DM Mono', monospace;
    font-size: clamp(9px, 1vw, 11px);
    letter-spacing: 0.06em;
    color: rgba(245,240,235,0.2);
    max-width: 380px;
    line-height: 1.7;
    font-style: italic;
  }
  .footer-def strong {
    font-style: normal;
    color: rgba(245,240,235,0.35);
    font-weight: 400;
  }
  .footer-right {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(245,240,235,0.15);
  }

  /* VERTICAL TEXT ACCENT */
  .vert-text {
    position: fixed;
    right: clamp(16px, 3vw, 40px);
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    transform-origin: center;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(245,240,235,0.1);
    white-space: nowrap;
    pointer-events: none;
    z-index: 2;
    animation: fadeUp 2s ease both;
    animation-delay: 1.3s;
  }

  /* SCAN LINE */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
    animation: scan 8s linear infinite;
    pointer-events: none;
    z-index: 99;
  }
  @keyframes scan {
    0%   { top: 0%; }
    100% { top: 100%; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { transform: translateY(110%); }
    to   { transform: translateY(0); }
  }

  /* HOVER INTERACTION — color flash on hover over headline */
  .headline: hover {  }
</style>
</head>
<body>


<div class="scanline"></div>

<div class="orb-container">
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<span class="vert-text">Recognition · Feeling · Clarity · You</span>

<div class="page">
  <header>
    <div class="logo">beVivid</div>
  </header>

  <main>
    <p class="eyebrow">Something is coming</p>

    <div class="headline-wrap">
      <span class="headline">Be</span>
    </div>
    <div class="headline-wrap">
      <span class="headline">
        <span class="vivid-word" data-text="Vivid.">Vivid.</span>
      </span>
    </div>

    <div class="sub-block">
      <p class="sub-text">
        A place where <em>you get recognized</em> — not for what you have,
        but for the impression you leave. Vivid people don't go unnoticed.
        We're building the space for them. For <em>you</em>.
      </p>

      <div class="form-wrap" id="formWrap">
        <label class="form-label">Get notified when we open</label>

        <div class="notify-toggle">
          <button class="toggle-btn active" id="btnEmail" onclick="setMode('email')">Email</button>
          <button class="toggle-btn" id="btnSms" onclick="setMode('sms')">SMS</button>
        </div>

        <div class="form-row">
          <span class="sms-prefix" id="smsPrefix">+1</span>
          <input type="text" id="mainInput" placeholder="your@email.com" autocomplete="off" />
          <button onclick="handleSubmit()">Notify me</button>
        </div>
        <p class="form-note">No noise. Just the moment we open the doors.</p>
        <p class="success-msg" id="successMsg">✦ &nbsp;You're on the list. We'll find you.</p>

        <!-- Hidden Brevo iframes -->
        <iframe name="brevo-hidden-email" style="display:none;" aria-hidden="true"></iframe>
        <iframe name="brevo-hidden-sms" style="display:none;" aria-hidden="true"></iframe>

        <!-- Email form -->
        <form id="brevo-email-form" method="POST" action="https://cd7a2b82.sibforms.com/serve/MUIFAGkhbkF_N7Ur_VefaSd57zX1BiR5C4aPXPgLR4vPoGwanPI4uNuzZATM_NXCUGxZGy9rUeMVtW4dN8sA11nAgwqdnlp_7SNBV-qX2x3tIl8HxzHd3vmhzzsDzx-5tZJUxf5aFZsxa-n-g8krrnnlfATUaf2x7QrQGgsmPxoXriybxYxvbnfHEYbFOqCzuWGEqwISuadKpY5Ulw==" target="brevo-hidden-email" style="display:none;">
          <input type="text" name="EMAIL" id="brevo-email" />
          <input type="text" name="email_address_check" value="" />
          <input type="hidden" name="locale" value="en" />
          <input type="hidden" name="html_type" value="simple" />
        </form>

        <!-- SMS form -->
        <form id="brevo-sms-form" method="POST" action="https://cd7a2b82.sibforms.com/serve/MUIFAEkGS-e7i2z-M9mJ7VVbJ4UpkfQB7m07LBzx3fOBBsuQDs2baqCO1WjwwZJG1LlLQcDrCcoBz-6I7gqsHMmC42z_I23Dll827jgwbRqyATU03iy7reUXR3ScBg0ug1OxSlf6CZCEkbf4L6XAEObTXb6G6ii2eYgl52Rij9trO6-utWZrm4IQV2y1df3j3IPd1QLRSvxhsWd8fA==" target="brevo-hidden-sms" style="display:none;">
          <input type="hidden" name="SMS__COUNTRY_CODE" value="+1" />
          <input type="text" name="SMS" id="brevo-sms" />
          <input type="text" name="email_address_check" value="" />
          <input type="hidden" name="locale" value="en" />
          <input type="hidden" name="html_type" value="simple" />
        </form>
      </div>
    </div>
  </main>

  <footer>
  </footer>
</div>

<script>
  let mode = 'email';

  // Check localStorage — if already signed up, hide form
  if (localStorage.getItem('bevivid_notified')) {
    document.addEventListener('DOMContentLoaded', () => {
      const wrap = document.getElementById('formWrap');
      if (wrap) {
        wrap.querySelector('.notify-toggle').style.display = 'none';
        wrap.querySelector('.form-row').style.display = 'none';
        wrap.querySelector('.form-note').style.display = 'none';
        const msg = document.getElementById('successMsg');
        msg.style.display = 'block';
        msg.textContent = '✦  You\'re already on the list. We\'ll find you.';
      }
    });
  }

  function setMode(m) {
    mode = m;
    const input = document.getElementById('mainInput');
    const prefix = document.getElementById('smsPrefix');
    document.getElementById('btnEmail').classList.toggle('active', m === 'email');
    document.getElementById('btnSms').classList.toggle('active', m === 'sms');
    if (m === 'email') {
      input.placeholder = 'your@email.com';
      input.type = 'email';
      prefix.style.display = 'none';
    } else {
      input.placeholder = '2015550123';
      input.type = 'tel';
      prefix.style.display = 'flex';
    }
    input.value = '';
    input.focus();
  }

  function handleSubmit() {
    const input = document.getElementById('mainInput');
    const msg = document.getElementById('successMsg');
    const row = document.querySelector('.form-row');
    const toggle = document.querySelector('.notify-toggle');
    const note = document.querySelector('.form-note');
    const val = input.value.trim();

    if (mode === 'email') {
      if (!val || !val.includes('@')) {
        input.style.borderLeft = '2px solid var(--vivid-1)';
        setTimeout(() => input.style.borderLeft = '', 1000);
        return;
      }
      document.getElementById('brevo-email').value = val;
      document.getElementById('brevo-email-form').submit();
    } else {
      const digits = val.replace(/\D/g, '');
      if (digits.length < 6) {
        input.style.borderLeft = '2px solid var(--vivid-1)';
        setTimeout(() => input.style.borderLeft = '', 1000);
        return;
      }
      document.getElementById('brevo-sms').value = digits;
      document.getElementById('brevo-sms-form').submit();
    }

    // Save to localStorage so form doesn't show again
    localStorage.setItem('bevivid_notified', '1');

    // Fade out form, show success
    row.style.opacity = '0';
    row.style.transition = 'opacity 0.4s';
    toggle.style.opacity = '0';
    toggle.style.transition = 'opacity 0.4s';
    setTimeout(() => {
      row.style.display = 'none';
      toggle.style.display = 'none';
      note.style.display = 'none';
      msg.style.display = 'block';
    }, 400);
    input.value = '';
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('mainInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  });

  // Parallax orbs on mouse
  document.addEventListener('mousemove', e => {
    const orbs = document.querySelectorAll('.orb');
    const cx = (e.clientX / window.innerWidth  - 0.5) * 2;
    const cy = (e.clientY / window.innerHeight - 0.5) * 2;
    orbs.forEach((orb, i) => {
      const depth = (i + 1) * 12;
      orb.style.transform = `translate(${cx * depth}px, ${cy * depth}px)`;
    });
  });
</script>
</body>
</html>
